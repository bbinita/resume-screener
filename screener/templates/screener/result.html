{% extends "screener/base.html" %} {% block content %}
<h1>Results</h1>
<div class="score">Match Score: <span>{{ results.score }}%</span></div>
<p class="keywords-title">Missing Keywords</p>
<div class="keyword-list">
  {% for word in results.missing_keywords %}
  <p>{{ word }}</p>
  {% endfor %}
</div>
<a href="{% url 'index' %}" class="back-link">← Analyze another resume</a>
{% endblock %}
